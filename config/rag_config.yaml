# RAG Pipeline Configuration

rag:
  embedding:
    provider: "openai"
    model: "text-embedding-ada-002"
    dimension: 1536
    batch_size: 100

  vector_store:
    type: "milvus"
    collection: "knowledge_base"
    host: "${MILVUS_HOST}"
    port: 19530

  retrieval:
    # Number of documents to retrieve
    top_k: 5
    # Minimum similarity threshold (0.0 to 1.0)
    similarity_threshold: 0.7
    # Enable cross-encoder reranking (improves accuracy, adds latency)
    rerank: false
    rerank_model: "cross-encoder/ms-marco-MiniLM-L-6v2"
    # Maximum context length to send to LLM (characters)
    max_context_length: 4000

  text_splitting:
    chunk_size: 500
    chunk_overlap: 50
    separators:
      - "\n\n"
      - "\n"
      - ". "
      - " "
